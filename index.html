*{box-sizing:border-box;}
body{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
button{transition:all .15s ease!important;outline:none;}
button:hover{filter:brightness(1.08);transform:translateY(-1px);}
button:active{transform:translateY(0);}
.cv-card{transition:box-shadow .2s,transform .2s;}
.info-btn{width:22px;height:22px;border-radius:50%;border:2px solid #cbd5e1;background:#fff;color:#64748b;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-family:Georgia,serif;line-height:1;flex-shrink:0;padding:0;margin-left:8px;vertical-align:middle;}
.info-btn:hover{border-color:#3E47DD!important;color:#3E47DD!important;background:#eef0ff!important;filter:none!important;transform:scale(1.12)!important;}
.info-modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px;animation:infoFadeIn .2s ease;}
@keyframes infoFadeIn{from{opacity:0}to{opacity:1}}
@keyframes infoSlideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.info-modal{background:#fff;border-radius:20px;max-width:560px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:0 24px 48px rgba(0,0,0,.16);animation:infoSlideUp .25s ease;}
.info-modal-header{padding:24px 28px 0;display:flex;align-items:flex-start;justify-content:space-between;}
.info-modal-title{font-size:17px;font-weight:700;color:#1e293b;display:flex;align-items:center;gap:10px;}
.info-modal-close{width:32px;height:32px;border-radius:8px;border:none;background:#f1f5f9;color:#64748b;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;}
.info-modal-close:hover{background:#e2e8f0!important;color:#1e293b!important;filter:none!important;transform:none!important;}
.info-modal-body{padding:20px 28px 28px;}
.info-section{margin-bottom:18px;}
.info-section:last-child{margin-bottom:0;}
.info-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#94a3b8;margin-bottom:8px;}
.info-section p{font-size:14px;line-height:1.6;color:#475569;}
.info-divider{height:1px;background:#f1f5f9;margin:16px 0;}
.info-tag{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:4px 10px;border-radius:6px;font-weight:500;margin:2px 3px 2px 0;}
.info-tag .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.info-filter{font-size:13px;color:#475569;margin-bottom:4px;}
.info-filter b{color:#334155;}
.info-filter code{font-family:'SF Mono',Monaco,monospace;font-size:12px;background:#f1f5f9;padding:1px 6px;border-radius:4px;color:#6366f1;}
.cv-card:hover{box-shadow:0 6px 24px rgba(62,71,221,.13)!important;transform:translateY(-1px);}
.cv-red{background:linear-gradient(135deg,#FFF5F5 0%,#FFF0F0 100%)!important;border-left:4px solid #ef4444!important;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:#EDF1F8;}
::-webkit-scrollbar-thumb{background:#3E47DD55;border-radius:3px;}

// === CUSTOM TOOLTIPS ===
const CTooltip = ({active,payload,label,periodTotals}) => {
  if(!active||!payload) return null;
  const monthTotal = payload.reduce((s,p)=>s+(p.value||0),0);
  const periodGrand = periodTotals ? Object.values(periodTotals).reduce((s,v)=>s+v,0) : 0;
  return (
    <div style={{background:'#fff',border:'1px solid #e5e7eb',borderRadius:8,padding:'10px 14px',fontSize:12,boxShadow:'0 2px 8px rgba(0,0,0,.1)',minWidth:230}}>
      <div style={{fontWeight:700,marginBottom:6,borderBottom:'1px solid #f3f4f6',paddingBottom:4}}>{label}</div>
      {payload.map((p,i) => {
        const pctMonth = monthTotal ? Math.round(p.value/monthTotal*100) : 0;
        const pctPeriod = periodTotals && periodGrand ? Math.round((periodTotals[p.dataKey]||0)/periodGrand*100) : null;
        return (
          <div key={i} style={{marginBottom:5}}>
            <div style={{display:'flex',justifyContent:'space-between',gap:12}}>
              <span style={{color:p.color,fontWeight:600}}>{p.name}</span>
              <span><b>{p.value}</b> <span style={{color:'#6b7280'}}>({pctMonth}% mo.)</span></span>
            </div>
            {pctPeriod!==null && <div style={{fontSize:10,color:'#9ca3af',textAlign:'right'}}>
              Σ {periodTotals[p.dataKey]} · {pctPeriod}% of total period
            </div>}
          </div>
        );
      })}
      <div style={{borderTop:'1px solid #e5e7eb',marginTop:4,paddingTop:4,fontWeight:700,display:'flex',justifyContent:'space-between'}}>
        <span>Month total</span><span>{monthTotal}</span>
      </div>
    </div>
  );
};

const LTooltip = ({active,payload,label}) => {
  if(!active||!payload) return null;
  const items = payload.filter(p=>p.value>0).sort((a,b)=>b.value-a.value);
  const t = items.reduce((s,p)=>s+p.value,0);
  if(t===0) return null;
  return (
    <div style={{background:'#fff',border:'1px solid #e5e7eb',borderRadius:8,padding:'10px 14px',fontSize:12,boxShadow:'0 2px 8px rgba(0,0,0,.1)'}}>
      <div style={{fontWeight:600,marginBottom:6}}>{label} — Lost: {t}</div>
      {items.map((p,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',gap:16,marginBottom:2}}>
        <span style={{color:p.color}}>{p.name}</span><span style={{fontWeight:600}}>{p.value} ({Math.round(p.value/t*100)}%)</span>
      </div>)}
    </div>
  );
};

const StackLabel = ({x,y,width,value}) => {

};

// === CHART COMPONENT ===
const Chart = ({data, title, subtitle, paidKey, accKey, lostKey, maxVal, infoKey, predMean, predLow, predHigh}) => {
  const reversed = [...data].reverse();  // newest left, oldest right
  // Totals for the entire displayed period
  const periodTotals = {
    [paidKey]: data.reduce((s,d)=>s+(d[paidKey]||0),0),
    [accKey]:  data.reduce((s,d)=>s+(d[accKey]||0),0),
    [lostKey]: data.reduce((s,d)=>s+(d[lostKey]||0),0),
  };
  const hasPred = predMean > 0;

  // Custom shape for prediction bar (hatched / dashed overlay)
  const PredBar = ({x, y, width, height}) => {
    if (!height || height <= 0) return null;
    return (
      <g>
        <rect x={x} y={y} width={width} height={height}
          fill="rgba(62,71,221,0.10)" stroke="#3E47DD"
          strokeWidth={1.5} strokeDasharray="5,3" rx={3}/>
        {/* diagonal stripes */}
        {[...Array(Math.ceil((width + height) / 7))].map((_,i) => {
          const offset = i * 7;
          return <line key={i} x1={x + offset} y1={y} x2={x + offset - height} y2={y + height}
            stroke="#3E47DD" strokeWidth={1} opacity={0.18}/>;
        })}
      </g>
    );
  };

  return (
  <div className="cv-card" style={{background:'#fff',borderRadius:10,padding:'20px 24px',marginBottom:16,boxShadow:'0 2px 8px rgba(31,43,89,.08)'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:hasPred?4:16}}>
      <h2 style={{fontSize:16,fontWeight:700,color:'#1F2B59',margin:0}}>{title}{infoKey && <InfoButton infoKey={infoKey}/>}</h2>
      {subtitle && <span style={{fontSize:11,color:'#7B87A8'}}>{subtitle}</span>}
    </div>
    {hasPred && (
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,padding:'6px 10px',background:'rgba(62,71,221,0.06)',borderRadius:6,border:'1px dashed rgba(62,71,221,0.3)'}}>
        <span style={{fontSize:11,color:'#3E47DD',fontWeight:600}}>📈 Predikce EOM (den {new Date().getDate()}):</span>
        <span style={{fontSize:12,fontWeight:700,color:'#3E47DD'}}>~{predMean}</span>
        <span style={{fontSize:11,color:'#6B7280'}}>rozsah {predLow}–{predHigh} objednávek</span>
      </div>
    )}
    <ResponsiveContainer width="100%" height={360}>
      <BarChart data={reversed} margin={{left:0,right:10,top:20,bottom:5}}>
        <CartesianGrid strokeDasharray="3 3" vertical={false}/>
        <XAxis dataKey="m" fontSize={11} tick={{fill:'#374151'}} interval={0} angle={-45} textAnchor="end" height={50}/>
        <YAxis domain={[0,maxVal||'auto']} fontSize={11}/>
        <Tooltip content={<CTooltip periodTotals={periodTotals}/>}/>
        <Legend wrapperStyle={{fontSize:12}}/>
        <Bar dataKey={paidKey} name="Contract Paid" stackId="a" fill={C.paid}
          label={({x,y,width,height,index}) => {
            const v = reversed[index]?.[paidKey]||0;
            if(!v||height<14) return null;
            return <text x={x+width/2} y={y+height/2+4} textAnchor="middle" fontSize={9} fill="#fff" fontWeight={600}>{v}</text>;
          }}
        />
        <Bar dataKey={accKey} name="Contract Accepted" stackId="a" fill={C.acc}
          label={({x,y,width,height,index}) => {
            const v = reversed[index]?.[accKey]||0;
            if(!v||height<10) return null;
            return <text x={x+width/2} y={y+height/2+4} textAnchor="middle" fontSize={9} fill="#1F2B59" fontWeight={700}>{v}</text>;
          }}
        />
        <Bar dataKey={lostKey} name="Storno (Lost)" stackId="a" fill={C.lost}
          radius={hasPred ? [0,0,0,0] : [4,4,0,0]}
          label={({x,y,width,height,index}) => {
            const d = reversed[index];
            if(!d) return null;
            const vLost = d[lostKey]||0;
            const hasPredBar = hasPred && index === 0 && d.predRemain > 0;
            const total = (d[paidKey]||0)+(d[accKey]||0)+vLost;
            const parts = [];
            if(vLost && height>=14)
              parts.push(<text key="v" x={x+width/2} y={y+height/2+4} textAnchor="middle" fontSize={9} fill="#fff" fontWeight={600}>{vLost}</text>);
            // Show total only if no prediction bar (prediction bar shows its own label)
            if(total && !hasPredBar)
              parts.push(<text key="t" x={x+width/2} y={y-5} textAnchor="middle" fontSize={10} fill="#374151" fontWeight={700}>{total}</text>);
            return parts.length ? <g>{parts}</g> : null;
          }}
        />
        {hasPred && (
          <Bar dataKey="predRemain" name="Predikce (zbytek)" stackId="a" shape={<PredBar/>}
            radius={[4,4,0,0]}
            label={({x,y,width,height,index}) => {
              if(index !== 0 || !height || height <= 0) return null;
              return (
                <g>
                  <text x={x+width/2} y={y-18} textAnchor="middle" fontSize={11} fill="#3E47DD" fontWeight={700}>{'~'+predMean}</text>
                  <text x={x+width/2} y={y-6} textAnchor="middle" fontSize={9} fill="#6B7280">{predLow+'–'+predHigh}</text>
                </g>
              );
            }}
          />
        )}
      </BarChart>
    </ResponsiveContainer>
  </div>
  );

const CAPhase2DonutsChart = ({data}) => {
  if (!data || data.length === 0) return null;
  const today = new Date();
  const curYear = today.getFullYear();
  const prevYear = curYear - 1;
  const curMonth = today.getMonth() + 1; // 1-based
  const MONTH_NAMES = ['Leden','Únor','Březen','Duben','Květen','Červen','Červenec','Srpen','Září','Říjen','Listopad','Prosinec'];
  const R = Math.PI / 180;
  const TOP_N = 10;

  // Aggregate reasons from monthly rows, sum counts, return top N
  const aggregate = (rows) => {
    const totals = {};
    rows.forEach(row => {
      (row.reasons || []).forEach(({r, c}) => {
        totals[r] = (totals[r] || 0) + c;
      });
    });
    const total = Object.values(totals).reduce((s,v) => s+v, 0);
    return Object.entries(totals)
      .sort((a,b) => b[1] - a[1])
      .slice(0, TOP_N)
      .map(([name, value], i) => ({
        name,
        value,
        color: RAW_REASON_PALETTE[i % RAW_REASON_PALETTE.length],
        pct: total > 0 ? +(value / total * 100).toFixed(1) : 0
      }));
  };

  const cmRows = data.filter(r => r.year === curYear && r.month === curMonth);
  const cyRows = data.filter(r => r.year === curYear);
  const pyRows = data.filter(r => r.year === prevYear);

  const sumTotal = (rows) => rows.reduce((s,r) => s + (r.reasons||[]).reduce((a,x)=>a+x.c,0), 0);

    if (pct < 6) return null;

          <div style={{fontSize:13,fontWeight:700,color:'#1F2B59'}}>{title}</div>

        <ResponsiveContainer width="100%" height={180}>
          <PieChart>
            <Pie data={chartData} cx="50%" cy="50%" innerRadius={50} outerRadius={82}
                 dataKey="pct" labelLine={false} label={labelRenderer} startAngle={90} endAngle={-270}>
              {chartData.map((d,i) => <Cell key={i} fill={d.color}/>)}
            </Pie>
            <Tooltip formatter={(v,n,p) => [`${p.payload.value.toLocaleString()} (${v}%)`, p.payload.name]}/>

        </ResponsiveContainer>
        <div style={{marginTop:4}}>
          {chartData.map((d,i) => (

// === MAIN DASHBOARD ===
const Dashboard = ({rawData, caRawData, caWeeklyData, caAcceptedData, caWeeklyCostData, caWeeklyCostDataDE, caSlaVinData, caSlaVinWeeklyData, caAudSelMonthly, caAudSelWeekly, firstCallData, fcClosedReasonData, caWeeklyStatusData, caClosedReasonData, caReasonRawData}) => {
  const [range, setRange] = useState(27);
  const today = new Date();
  const updated = `${today.getDate()}.${today.getMonth()+1}.${today.getFullYear()} ${String(today.getHours()).padStart(2,'0')}:${String(today.getMinutes()).padStart(2,'0')}`;

  // Transform Airtable records into data arrays
  const parseLabel = (label) => {
    const s = label || '';
    if (s.includes('/')) {
      const p = s.split('/');
      const y = parseInt(p[1]||0);
      const year = y < 100 ? 2000 + y : y;
      return year * 100 + parseInt(p[0]||0);
    }
    const MONTHS = {Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
    const parts = s.split(' ');
    if (parts.length === 2) {
      const m = MONTHS[parts[0]] || 0;
      const y = 2000 + parseInt(parts[1]||0);
      return y * 100 + m;
    }
    return 0;
  };
  const {D, CLD, ILD, hasInsta} = useMemo(() => {
    const sort = arr => arr.slice().sort((a,b) => parseLabel(a.m) - parseLabel(b.m));
    const validRaw = rawData.filter(r => r.fields && r.fields.Label);
    const D = sort(validRaw.map(r => {
      const f = r.fields;
      return {m: f.Label, cp: f.cp||0, ca: f.ca||0, ip: f.ip||0, ia: f.ia||0, cl: f.cl||0, il: f.il||0};
    }));
    const CLD = sort(validRaw.map(r => {
      const f = r.fields;
      const o = {m: f.Label};
      LOST_KEYS.forEach(k => o[`cl_${k}`] = f[`cl_${k}`]||0);
      return o;
    }));
    const ILD = sort(validRaw.map(r => {
      const f = r.fields;
      const o = {m: f.Label};
      LOST_KEYS.forEach(k => o[`il_${k}`] = f[`il_${k}`]||0);
      return o;
    }));
    const hasInsta = D.some(d => d.ip > 0 || d.ia > 0 || d.il > 0);
    return {D, CLD, ILD, hasInsta};
  }, [rawData]);

  const data = D.slice(-range);
  const cld = CLD.slice(-range);
  const ild = ILD.slice(-range);
  const last = D[D.length - 1];
  const prev = D.length > 1 ? D[D.length - 2] : null;

  const pct = (a, b) => {
    if (!b || b === 0) return '';
    const p = Math.round((a - b) / b * 100);
    return `${p >= 0 ? '+' : ''}${p}% vs ${prev?.m || ''}`;
  };

  const cTotal = last ? last.cp + last.ca : 0;
  const cPrev = prev ? prev.cp + prev.ca : 0;
  const iTotal = last ? last.ip + last.ia : 0;
  const iPrev = prev ? prev.ip + prev.ia : 0;
  const sTotal = last ? last.cl + last.il : 0;
  const sPrev = prev ? prev.cl + prev.il : 0;

  // Determine max values for consistent chart scaling
  const cMax = Math.max(...data.map(d => d.cp + d.ca + d.cl));
  const iMax = hasInsta ? Math.max(...data.map(d => d.ip + d.ia + d.il)) : 0;

  // === END-OF-MONTH PREDICTION for current Carvago month ===
  const MONTH_ABBR2 = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const curMonthLabel = `${MONTH_ABBR2[today.getMonth()]} ${String(today.getFullYear()).slice(2)}`;
  const isCurrentMonth = last?.m === curMonthLabel;
  const currentDay = today.getDate();
  const predPct = isCurrentMonth ? (PRED_CURVE[Math.min(currentDay, 31)] || 0.01) : 0;
  const cActual = isCurrentMonth ? (last?.cp||0) + (last?.ca||0) : 0;
  const predMean  = (isCurrentMonth && predPct > 0) ? Math.round(cActual / predPct) : 0;
  const predLow   = predMean ? Math.round(predMean * 0.82) : 0;
  const predHigh  = predMean ? Math.round(predMean * 1.22) : 0;
  const predRemain = predMean ? Math.max(0, predMean - cActual) : 0;
  const dataWithPred = (isCurrentMonth && predRemain > 0)
    ? data.map((d, i) => i === data.length - 1 ? {...d, predRemain} : d)
    : data;
  const cMaxPred = Math.max(cMax, predMean ? (last?.cp||0)+(last?.ca||0)+(last?.cl||0)+predRemain : 0);

  const buttons = [6, 12, 24, D.length];
  const btnLabels = ['6M', '12M', '24M', `${D.length}M`];

  const instaMonths = new Set(data.filter(d => d.ip > 0 || d.ia > 0 || d.il > 0).map(d => d.m));
  const instaData = data.filter(d => instaMonths.has(d.m));
  const instaLost = ild.filter(d => instaMonths.has(d.m));

  // === END-OF-MONTH PREDICTION for current Instamotion month ===
  // Základ: ip + ia (Contract Paid + Contract Accepted) — ia se do konce měsíce konvertuje na ip.
  // Stejná logika jako Carvago (cp + ca). Predikuje finální počet Contract Paid.
  const iActual = isCurrentMonth ? (last?.ip||0) + (last?.ia||0) : 0;
  const iPredMean  = (isCurrentMonth && predPct > 0) ? Math.round(iActual / predPct) : 0;
  const iPredLow   = iPredMean ? Math.round(iPredMean * 0.82) : 0;
  const iPredHigh  = iPredMean ? Math.round(iPredMean * 1.22) : 0;
  const iPredRemain = iPredMean ? Math.max(0, iPredMean - iActual) : 0;
  const instaDataWithPred = (isCurrentMonth && iPredRemain > 0 && instaMonths.has(curMonthLabel))
    ? instaData.map((d, i) => i === instaData.length - 1 ? {...d, predRemain: iPredRemain} : d)
    : instaData;
  const iMaxPred = Math.max(iMax, iPredMean ? (last?.ip||0)+(last?.ia||0)+(last?.il||0)+iPredRemain : 0);

  // CarAudit data
  const CA = useMemo(() => {
    if (!caRawData) return [];
    return caRawData.map(r => {
      const f = r.fields;
      if (!f.Label) return null;
      const o = {m: f.Label};
      ['total',...CA_STAGE_KEYS,...CA_REASON_KEYS].forEach(k => o[k] = f[k]||0);
      o.avg_amount = f.avg_amount||0;
      o.count_with_amount = f.count_with_amount||0;
      o.revenue = f.revenue != null ? f.revenue : null;
      return o;
    }).filter(Boolean).slice().sort((a,b) => parseLabel(a.m) - parseLabel(b.m));
  }, [caRawData]);
  const caData = CA.slice(-range);
  const lastCA = CA[CA.length - 1];
  const prevCA = CA.length > 1 ? CA[CA.length - 2] : null;
  const caCostPerCar = useMemo(() => {
    if (!CA.length || !D.length) return [];
    const exp = m => {if(!m)return '';const p=m.split('/');return p[1]&&p[1].length===2?p[0]+'/20'+p[1]:m;};
    const cpMap = {};
    D.forEach(d => {cpMap[d.m]=d.cp;});
    return CA.map(r => {
      const cp=cpMap[exp(r.m)];
      if(!cp||!r.avg_amount||!r.count_with_amount)return null;
      return {m:r.m,cost_per_car:Math.round(r.avg_amount*r.count_with_amount/cp)};
    }).filter(Boolean);
  }, [CA, D]);
  const caCostData = caCostPerCar.slice(-range);
  const caMarginData = useMemo(() => {
    return CA.map(r => {
      if (r.revenue == null) return null;
      const total_cost = Math.round((r.avg_amount||0) * (r.count_with_amount||0));
      const margin = Math.round((r.revenue||0) - total_cost);
      return {m: r.m, revenue: r.revenue, total_cost, margin};
    }).filter(Boolean);
  }, [CA]);
  const caMarginSlice = caMarginData.slice(-range);

  return (
    <div style={{minHeight:'100vh',background:'#EDF1F8'}}>
      {/* Navbar */}
      <div style={{background:'linear-gradient(135deg,#1A2550 0%,#1F2B59 60%,#252F6B 100%)',padding:'0 32px',display:'flex',alignItems:'center',justifyContent:'space-between',height:58,boxShadow:'0 4px 16px rgba(31,43,89,.25)',borderBottom:'2px solid #3E47DD'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <span style={{color:'#fff',fontWeight:800,fontSize:20,letterSpacing:'-0.5px'}}>carvago.</span>
          <span style={{color:'rgba(255,255,255,0.35)',fontSize:14,marginLeft:2}}>/ logistics dashboard</span>
        </div>
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          <span style={{fontSize:12,color:'rgba(255,255,255,0.5)',marginRight:8}}>{last?.m} (running)</span>
          {buttons.map((b, i) => (
            <button key={i} onClick={() => setRange(b)}
              style={{padding:'5px 14px',fontSize:12,fontWeight:600,
                background:range===b?'#3E47DD':'rgba(255,255,255,0.1)',
                color:'#fff',border:'none',borderRadius:6,cursor:'pointer',
                transition:'background 0.15s'}}>
              {btnLabels[i]}
            </button>
          ))}
        </div>
      </div>

      <div style={{maxWidth:1160,margin:'0 auto',padding:'24px 24px 40px'}}>
        {/* Summary Cards */}
        <div style={{display:'flex',gap:12,marginBottom:24,flexWrap:'wrap'}}>
          <Card title={`Carvago · ${last?.m}`} value={cTotal} sub={pct(cTotal, cPrev)} color='#3E47DD'/>
          {hasInsta && <Card title={`Instamotion · ${last?.m}`} value={iTotal} sub={pct(iTotal, iPrev)} color='#3E47DD'/>}
          <Card title="Contract Accepted" value={last ? last.ca + last.ia : 0} sub="not paid, current month" color={C.acc}/>
          <Card title="Contract Paid" value={last ? last.cp + last.ip : 0} sub="paid, current month" color={C.paid}/>
          <Card title={`Storno · ${last?.m}`} value={sTotal} sub={pct(sTotal, sPrev)} color={C.lost}/>
        </div>

        {/* Carvago Orders Chart */}
        <Chart data={dataWithPred} title={`Carvago — Orders by Month`} subtitle={`Updated ${updated}`}
          paidKey="cp" accKey="ca" lostKey="cl" maxVal={Math.ceil(cMaxPred * 1.12)} infoKey="carvago_orders"
          predMean={predMean} predLow={predLow} predHigh={predHigh}/>

        {/* Instamotion Orders Chart */}
        {hasInsta && <Chart data={instaDataWithPred} title={`Instamotion — Orders by Month`} subtitle={`Updated ${updated}`}
          paidKey="ip" accKey="ia" lostKey="il" maxVal={Math.ceil(iMaxPred * 1.12)} infoKey="instamotion_orders"
          predMean={iPredMean} predLow={iPredLow} predHigh={iPredHigh}/>}

        {/* Carvago Lost Reasons Chart */}
        <LostChart data={cld} title={`Carvago — Lost Orders by Reason`} subtitle={`Updated ${updated}`} prefix="cl" infoKey="carvago_lost"/>

        {/* Instamotion Lost Reasons Chart */}
        {hasInsta && <LostChart data={instaLost} title={`Instamotion — Lost Orders by Reason`} subtitle={`Updated ${updated}`} prefix="il" infoKey="instamotion_lost"/>}

        {/* Instamotion D&R Active Cases Chart */}
        {window.DR_ACTIVE_DATA && window.DR_ACTIVE_DATA.length > 0 && <>
          <div style={{display:'flex',alignItems:'center',gap:12,margin:'24px 0 16px'}}>
            <div style={{height:2,flex:1,background:'linear-gradient(90deg,transparent,#0ea5e944)'}}/>
            <span style={{fontSize:11,fontWeight:800,color:'#0ea5e9',textTransform:'uppercase',letterSpacing:'2px',background:'#fff',padding:'3px 14px',borderRadius:20,border:'1.5px solid #0ea5e944',boxShadow:'0 1px 6px rgba(14,165,233,.1)'}}>📋 Document &amp; Registration</span>
            <div style={{height:2,flex:1,background:'linear-gradient(90deg,#0ea5e944,transparent)'}}/>
          </div>
          <DRActiveChart
            data={window.DR_ACTIVE_DATA}
            title="📋 Instamotion — Active Document & Registration Cases"
            subtitle="Aktivní cases dle Kroschke Registration Status · stáří v pracovních dnech od Coordination with Vendor Date"
            infoKey="dr_active"
          />
        </>}

        {/* CarAudit Section Divider */}
        {caData.length > 0 && <div style={{display:'flex',alignItems:'center',gap:12,margin:'24px 0 16px'}}>
          <div style={{height:2,flex:1,background:'linear-gradient(90deg,transparent,#3E47DD44)'}}/>
          <span style={{fontSize:11,fontWeight:800,color:'#3E47DD',textTransform:'uppercase',letterSpacing:'2px',background:'#fff',padding:'3px 14px',borderRadius:20,border:'1.5px solid #3E47DD44',boxShadow:'0 1px 6px rgba(62,71,221,.1)'}}>🔍 CarAudit</span>
          <div style={{height:2,flex:1,background:'linear-gradient(90deg,#3E47DD44,transparent)'}}/>
        </div>}

        {/* 1st Call Status Weekly Chart */}
        {firstCallData && firstCallData.length > 0 && <FirstCallChart
          data={firstCallData}
          title="📞 1st Call — Done / In Progress / Closed (weekly)"
          subtitle="Done = CA Awaiting Selection Date filled · In Progress = no reject · Closed = rejected · by CA New CarAudit Date"
          infoKey="1st_call"
        />}

        {fcClosedReasonData && fcClosedReasonData.length > 0 && <div style={{borderLeft:'4px solid #ef4444',borderRadius:10,overflow:'hidden',marginBottom:16,background:'#FFF5F5'}}>
          <FCClosedReasonChart
            data={fcClosedReasonData}
            title="❌ 1st Call — Closed: reason breakdown (weekly)"
            subtitle="CA Reason Code groups · only Closed records (rejected before Awaiting Selection)"
            infoKey="1st_call_reason"
          />
        </div>}

        {/* Section divider */}
        {caWeeklyStatusData && caWeeklyStatusData.length > 0 && <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16,marginTop:4}}>
          <div style={{fontWeight:800,fontSize:12,color:'#3E47DD',whiteSpace:'nowrap',textTransform:'uppercase',letterSpacing:'1.5px',background:'#fff',padding:'3px 14px',borderRadius:20,border:'1.5px solid #3E47DD44',boxShadow:'0 1px 6px rgba(62,71,221,.1)'}}>📋 CarAudit Pipeline</div>
          <div style={{height:2,flex:1,background:'linear-gradient(90deg,#3E47DD44,transparent)'}}/>
        </div>}

        {/* CarAudit Status Weekly Chart */}
        {caWeeklyStatusData && caWeeklyStatusData.length > 0 && <CarAuditWeeklyChart
          data={caWeeklyStatusData}
          title="📊 CarAudit — In Progress / Done / Closed (weekly)"
          subtitle="InProgress = Awaiting Sel+APPROVED / Auditor Sel|Audit Order|Preparation|Audit Result bez reject · Done = CarAudit Done · Closed = Auditor Sel|Audit Order|Preparation|Audit Result s reject"
          infoKey="caraudit_pipeline"
        />}

        {/* CarAudit Closed Reason Chart */}
        {caClosedReasonData && caClosedReasonData.length > 0 && <div style={{borderLeft:'4px solid #ef4444',borderRadius:10,overflow:'hidden',marginBottom:16,background:'#FFF5F5'}}>
          <CAClosedReasonChart
            data={caClosedReasonData}
            title="🔴 CarAudit — Closed · Reason breakdown (weekly)"
            subtitle="Pouze Closed CA · CA Reason Code · dle CA New CarAudit Date"
            infoKey="caraudit_reason"
          />
        </div>}
        {caClosedReasonData && caClosedReasonData.length > 0 &&
          {caReasonRawData && caReasonRawData.length > 0 &&
            <CAPhase2DonutsChart data={caReasonRawData}/>
          }
        }
                {/* CarAudit KPI Cards */}
        {caData.length > 0 && <div style={{display:'flex',gap:12,marginBottom:16,flexWrap:'wrap'}}>
          <Card title={`CarAudit Total · ${lastCA?.m}`} value={lastCA?.total||0}
            sub={prevCA ? `${Math.round(((lastCA.total-prevCA.total)/prevCA.total)*100)>=0?'+':''}${Math.round(((lastCA.total-prevCA.total)/prevCA.total)*100)}% vs ${prevCA.m}` : ''}
            color='#6366f1'/>
          <Card title="Car Check (month)" value={lastCA?.stage_car_check||0} sub="most common rejection stage" color='#3E47DD'/>
          <Card title="Car not available" value={lastCA?.reason_car_na||0} sub="main rejection reason" color='#ef4444'/>
          <Card title="Seller fault" value={lastCA?.reason_seller||0} sub="seller fault" color='#f97316'/>
        </div>}



        {/* CarAudit Done — Weekly chart */}
        {caWeeklyData && caWeeklyData.length > 0 && <WeeklyCAChart
          data={caWeeklyData}
          title="✅ CA done — Recommended / Not recommended"
          subtitle={`CA CarAudit Done Date · Approved = Recommended · ${caWeeklyData.length} weeks`}
          infoKey="ca_recommended"
        />}

        {/* CA Done — Accepted Rate (monthly) */}
        {caAcceptedData && caAcceptedData.length > 0 && <AcceptedCAChart
          data={caAcceptedData}
          title="📊 CA done — Acceptance rate (monthly)"
          subtitle="% of Recommended CarAudits accepted by customer · by CA CarAudit Done Date"
          infoKey="acceptance_rate"
        />}

        {/* CarAudit Cost Structure Chart */}
        {caWeeklyCostData && caWeeklyCostData.length > 0 && <CostStructureChart
          data={caWeeklyCostData}
          title="💶 CarAudit — Cost structure (weekly)"
          subtitle="% share of price categories · Done / Closed date"
          infoKey="cost_structure"
        />}

        {/* CarAudit Cost Structure DE Chart */}
        {caWeeklyCostDataDE && caWeeklyCostDataDE.length > 0 && <CostStructureChart
          data={caWeeklyCostDataDE}
          title="💶 CarAudit — Cost structure DE (weekly)"
          subtitle="CA Vendor Country = DE only · % share of price categories"
          infoKey="cost_structure_de"
        />}

        {/* CA SLA: CA New to VIN Check */}
        {caSlaVinData && caSlaVinData.length > 0 && <CASlaChart
          data={caSlaVinData}
          title="⏱️ CA New → VIN Check (NET hod.)"
          subtitle="% share of response time buckets · Mon-Fri 08:00-17:00 · Sat 08:00-13:00 · grouped by month of CA New"
          infoKey="vin_check_monthly"
        />}

        {/* CA SLA Weekly: CA New to VIN Check */}
        {caSlaVinWeeklyData && caSlaVinWeeklyData.length > 0 && <CASlaWeeklyChart
          data={caSlaVinWeeklyData}
          title="⏱️ CA New → VIN Check (NET hrs, weekly)"
          subtitle="% share of response time buckets · Mon-Fri 08:00-17:00 · Sat 08:00-13:00 · grouped by week of CA New"
          infoKey="vin_check_weekly"
        />}

        {/* CA SLA: Auditor Selection to Done/Closed (monthly) */}
        {caAudSelMonthly && caAudSelMonthly.length > 0 && <CAudSelChart
          data={caAudSelMonthly}
          title="⏱️ CA Auditor Selection → Done/Closed (NET hrs, monthly)"
          subtitle="CA Auditor Selection Date to CA Done or Closed · grouped by month of close"
          infoKey="auditor_monthly"
        />}

        {/* CA SLA: Auditor Selection to Done/Closed (weekly) */}
        {caAudSelWeekly && caAudSelWeekly.length > 0 && <CAudSelChart
          data={caAudSelWeekly}
          title="⏱️ CA Auditor Selection → Done/Closed (NET hrs, weekly)"
          subtitle="CA Auditor Selection Date to CA Done or Closed · grouped by week of close"
          weekly={true}
          infoKey="auditor_weekly"
        />}

        {/* CarAudit Avg Cost Chart */}
        {caData.length > 0 && caData.some(d => d.avg_amount > 0) && AvgCostChartComp && <AvgCostChartComp
          data={caData}
          title="CarAudit — Average price EUR / month"
          subtitle="CarAudits with a value in CarAudit Amount only (incl. 0)"
          infoKey="avg_price"
        />}

        {/* EUR cost per CarAudit per 1 sold car */}
        {caCostData.length > 0 && CostPerCarChartComp && <CostPerCarChartComp
          data={caCostData}
          title="💶 EUR CarAudit cost per 1 sold car (monthly)"
          subtitle="(avg_amount × count_with_amount) / cp · Carvago Paid"
          infoKey="cost_per_car"
        />}

        {/* Revenue vs Cost (Margin) */}
        {caMarginSlice.length > 0 && RevenueCostChartComp && <RevenueCostChartComp
          data={caMarginSlice}
          title="💶 Revenue vs Cost — CarAudit margin (monthly)"
          subtitle="Revenue = FA_CA_2025 › REVE_CA_FROM_2024 Total · Cost = avg_amount × count · Margin = Revenue − Cost"
          infoKey="revenue_cost"
        />}

        {/* Footer */}
        <div style={{textAlign:'center',paddingTop:20,fontSize:11,color:'#7B87A8',borderTop:'1px solid #D0D8EC'}}>
          <div>📡 Source: Salesforce &amp; Airtable · 💳 Paid Date = Contract Paid · ✅ Accepted = Contract Accepted · ❌ Lost = Storno</div>
        </div>
      </div>
    </div>
  );
};


// === APP ROOT ===
// USE_TEST_DATA=false for production (Airtable API fetch)
const USE_TEST_DATA = false;

const App = () => {
  const [data, setData] = useState(USE_TEST_DATA ? TEST_DATA : null);
  const [caData, setCaData] = useState(USE_TEST_DATA ? CA_TEST_DATA : null);
  const [caWeeklyData] = useState(CA_WEEKLY_TEST_DATA);
  const [caAcceptedData] = useState(CA_ACCEPTED_MONTHLY_DATA);
  const [caWeeklyCostData] = useState(CA_WEEKLY_COST_DATA);
  const [caWeeklyCostDataDE] = useState(CA_WEEKLY_COST_DATA_DE);
  const [caSlaVinData] = useState(CA_SLA_VIN_DATA);
  const [caSlaVinWeeklyData] = useState(CA_SLA_VIN_WEEKLY_DATA);
  const [caAudSelMonthly] = useState(CA_AUDSEL_MONTHLY_DATA);
  const [caAudSelWeekly] = useState(CA_AUDSEL_WEEKLY_DATA);
  const [firstCallData] = useState(window.FIRST_CALL_WEEKLY_DATA || []);
  const [fcClosedReasonData] = useState(window.FC_CLOSED_REASON_DATA || []);
  const [caWeeklyStatusData] = useState(window.CARAUDIT_WEEKLY_DATA || []);
  const [caClosedReasonData] = useState(window.CA_CLOSED_REASON_DATA || []);
  const [caReasonRawData, setCaReasonRawData] = useState([]);
  const [loading, setLoading] = useState(!USE_TEST_DATA);
  const [error, setError] = useState(null);
  const [token, setToken] = useState(null);

  useEffect(() => {
    if (USE_TEST_DATA) return;
    const t = getToken();
    setToken(t);
    if (!t) { setLoading(false); return; }
    fetchData(t);
  }, []);

  const fetchData = async (t) => {
    setLoading(true); setError(null);
    try {
      const [resp, caResp, rawResp] = await Promise.all([
        fetch(API_URL, {headers:{'Authorization':`Bearer ${t}`}}),
        fetch(CA_API_URL, {headers:{'Authorization':`Bearer ${t}`}}),
        fetch(CA_REASON_RAW_API_URL, {headers:{'Authorization':`Bearer ${t}`}})
      ]);
      if (!resp.ok) {
        if (resp.status===401||resp.status===403) throw new Error('Invalid token.');
        throw new Error(`API error: ${resp.status}`);
      }
      const json = await resp.json();
      setData(json.records);
      if (caResp.ok) {
        const caJson = await caResp.json();
        setCaData(caJson.records);
      }
      if (rawResp.ok) {
        const rawJson = await rawResp.json();
        const parsed = (rawJson.records || []).map(r => ({
          period: r.fields.Period || '',
          year: r.fields.Year || 0,
          month: r.fields.Month || 0,
          reasons: (() => { try { return JSON.parse(r.fields.ReasonsJson || '[]'); } catch(e) { return []; } })()
        }));
        setCaReasonRawData(parsed);
      }
    } catch(err) { setError(err.message); }
    finally { setLoading(false); }
  };

  const handleReset = () => {
    try{localStorage.removeItem('airtable_dashboard_token');}catch(e){}
    setToken(null); setData(null); setCaData(null); setError(null); setLoading(false);
  };

  if (!USE_TEST_DATA && !token && !loading) return <TokenScreen/>;
  if (loading) return <LoadingScreen/>;
  if (error) return <ErrorScreen msg={error} onRetry={()=>fetchData(token)} onReset={handleReset}/>;
  if (data) return <Dashboard rawData={data} caRawData={caData} caWeeklyData={caWeeklyData} caAcceptedData={caAcceptedData} caWeeklyCostData={caWeeklyCostData} caWeeklyCostDataDE={caWeeklyCostDataDE} caSlaVinData={caSlaVinData} caSlaVinWeeklyData={caSlaVinWeeklyData} caAudSelMonthly={caAudSelMonthly} caAudSelWeekly={caAudSelWeekly} firstCallData={firstCallData} fcClosedReasonData={fcClosedReasonData} caWeeklyStatusData={caWeeklyStatusData} caClosedReasonData={caClosedReasonData} caReasonRawData={caReasonRawData}/>;
  return null;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
