<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carvago Order Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f3f4f6;color:#374151}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo} = React;
const {BarChart,Bar,XAxis,YAxis,Tooltip,Legend,ResponsiveContainer,CartesianGrid} = Recharts;

// === AIRTABLE CONFIG ===
const BASE_ID = 'app4c8CJDBWFzI4II';
const TABLE_ID = 'tbl9Vw9l5sIXiO21g';
const API_URL = `https://api.airtable.com/v0/${BASE_ID}/${TABLE_ID}?sort%5B0%5D%5Bfield%5D=Month&sort%5B0%5D%5Bdirection%5D=asc&pageSize=100`;

// === TOKEN MANAGEMENT ===
function getToken() {
  if (false) return null;
  try {
    const params = new URLSearchParams(window.location.search);
    const urlToken = params.get('token');
    if (urlToken) {
      try { localStorage.setItem('airtable_dashboard_token', urlToken); } catch(e) {}
      try { window.history.replaceState({}, document.title, window.location.origin + window.location.pathname); } catch(e) {}
      return urlToken;
    }
    return localStorage.getItem('airtable_dashboard_token');
  } catch(e) {
    return null;
  }
}

// === COLORS ===
const C = {paid:'#86c5a0', acc:'#ef8533', lost:'#3b82f6'};
const LC = ['#ef4444','#f97316','#eab308','#84cc16','#22c55e','#14b8a6','#06b6d4','#6366f1','#a855f7','#ec4899'];
const LOST_KEYS = ['car_not_available','car_was_sold','sales_lifecycle','personal_reasons','deal_cancelled','customer_withdrew','car_issues','contract_not_paid','chose_another_carvago_car','other'];
const LOST_LABELS = {'car_not_available':'Car not available','car_was_sold':'Car was sold','sales_lifecycle':'Sales Lifecycle','personal_reasons':'Personal reasons','deal_cancelled':'Deal cancelled','customer_withdrew':'Customer withdrew','car_issues':'Car issues','contract_not_paid':'Contract not paid','chose_another_carvago_car':'Chose another Carvago car','other':'Other'};

// === TOKEN ENTRY SCREEN ===
const TokenScreen = () => {
  const [input, setInput] = useState('');
  const handleSubmit = (e) => {
    e.preventDefault();
    if (input.trim()) {
      localStorage.setItem('airtable_dashboard_token', input.trim());
      window.location.reload();
    }
  };
  return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'#f3f4f6'}}>
      <div style={{background:'#fff',borderRadius:12,padding:40,maxWidth:480,width:'100%',boxShadow:'0 4px 24px rgba(0,0,0,.08)',textAlign:'center'}}>
        <h1 style={{fontSize:24,fontWeight:700,marginBottom:8,color:'#111827'}}>Carvago Order Dashboard</h1>
        <p style={{color:'#6b7280',marginBottom:24,fontSize:14,lineHeight:1.5}}>
          Pro přístup k dashboardu zadejte Airtable API token.<br/>
          Nebo přidejte token do URL: <code style={{background:'#f3f4f6',padding:'2px 6px',borderRadius:4,fontSize:12}}>?token=váš_token</code>
        </p>
        <form onSubmit={handleSubmit}>
          <input
            type="password"
            value={input}
            onChange={e=>setInput(e.target.value)}
            placeholder="patXXX..."
            style={{width:'100%',padding:'10px 14px',border:'1px solid #d1d5db',borderRadius:8,fontSize:14,marginBottom:12,outline:'none'}}
          />
          <button type="submit" style={{width:'100%',padding:'10px 14px',background:'#3b82f6',color:'#fff',border:'none',borderRadius:8,fontSize:14,fontWeight:600,cursor:'pointer'}}>
            Načíst dashboard
          </button>
        </form>
      </div>
    </div>
  );
};

// === LOADING SCREEN ===
const LoadingScreen = () => (
  <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'#f3f4f6'}}>
    <div style={{textAlign:'center'}}>
      <div style={{width:40,height:40,border:'4px solid #e5e7eb',borderTopColor:'#3b82f6',borderRadius:'50%',animation:'spin 1s linear infinite',margin:'0 auto 16px'}}></div>
      <p style={{color:'#6b7280',fontSize:14}}>Načítám data z Airtable...</p>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  </div>
);

// === ERROR SCREEN ===
const ErrorScreen = ({msg, onRetry, onReset}) => (
  <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'#f3f4f6'}}>
    <div style={{background:'#fff',borderRadius:12,padding:40,maxWidth:480,width:'100%',boxShadow:'0 4px 24px rgba(0,0,0,.08)',textAlign:'center'}}>
      <h2 style={{fontSize:20,fontWeight:700,marginBottom:8,color:'#ef4444'}}>Chyba při načítání dat</h2>
      <p style={{color:'#6b7280',marginBottom:20,fontSize:14}}>{msg}</p>
      <div style={{display:'flex',gap:8,justifyContent:'center'}}>
        <button onClick={onRetry} style={{padding:'8px 20px',background:'#3b82f6',color:'#fff',border:'none',borderRadius:8,fontSize:14,cursor:'pointer'}}>Zkusit znovu</button>
        <button onClick={onReset} style={{padding:'8px 20px',background:'#6b7280',color:'#fff',border:'none',borderRadius:8,fontSize:14,cursor:'pointer'}}>Změnit token</button>
      </div>
    </div>
  </div>
);

// === CARD COMPONENT ===
const Card = ({title, value, sub, color}) => (
  <div style={{background:'#fff',borderRadius:10,padding:'14px 18px',flex:1,minWidth:160,boxShadow:'0 1px 3px rgba(0,0,0,.06)'}}>
    <div style={{fontSize:12,color:'#6b7280',marginBottom:4}}>{title}</div>
    <div style={{fontSize:28,fontWeight:700,color:color||'#111827'}}>{value}</div>
    {sub && <div style={{fontSize:11,color:sub.startsWith('+') ? '#22c55e' : sub.startsWith('-') ? '#ef4444' : '#6b7280',marginTop:2}}>{sub}</div>}
  </div>
);

// === CUSTOM TOOLTIPS ===
const CTooltip = ({active,payload,label,periodTotals}) => {
  if(!active||!payload) return null;
  const monthTotal = payload.reduce((s,p)=>s+(p.value||0),0);
  const periodGrand = periodTotals ? Object.values(periodTotals).reduce((s,v)=>s+v,0) : 0;
  return (
    <div style={{background:'#fff',border:'1px solid #e5e7eb',borderRadius:8,padding:'10px 14px',fontSize:12,boxShadow:'0 2px 8px rgba(0,0,0,.1)',minWidth:230}}>
      <div style={{fontWeight:700,marginBottom:6,borderBottom:'1px solid #f3f4f6',paddingBottom:4}}>{label}</div>
      {payload.map((p,i) => {
        const pctMonth = monthTotal ? Math.round(p.value/monthTotal*100) : 0;
        const pctPeriod = periodTotals && periodGrand ? Math.round((periodTotals[p.dataKey]||0)/periodGrand*100) : null;
        return (
          <div key={i} style={{marginBottom:5}}>
            <div style={{display:'flex',justifyContent:'space-between',gap:12}}>
              <span style={{color:p.color,fontWeight:600}}>{p.name}</span>
              <span><b>{p.value}</b> <span style={{color:'#6b7280'}}>({pctMonth}% měs.)</span></span>
            </div>
            {pctPeriod!==null && <div style={{fontSize:10,color:'#9ca3af',textAlign:'right'}}>
              Σ {periodTotals[p.dataKey]} · {pctPeriod}% z celého období
            </div>}
          </div>
        );
      })}
      <div style={{borderTop:'1px solid #e5e7eb',marginTop:4,paddingTop:4,fontWeight:700,display:'flex',justifyContent:'space-between'}}>
        <span>Měsíc celkem</span><span>{monthTotal}</span>
      </div>
    </div>
  );
};

const LTooltip = ({active,payload,label}) => {
  if(!active||!payload) return null;
  const items = payload.filter(p=>p.value>0).sort((a,b)=>b.value-a.value);
  const t = items.reduce((s,p)=>s+p.value,0);
  if(t===0) return null;
  return (
    <div style={{background:'#fff',border:'1px solid #e5e7eb',borderRadius:8,padding:'10px 14px',fontSize:12,boxShadow:'0 2px 8px rgba(0,0,0,.1)'}}>
      <div style={{fontWeight:600,marginBottom:6}}>{label} — Lost: {t}</div>
      {items.map((p,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',gap:16,marginBottom:2}}>
        <span style={{color:p.color}}>{p.name}</span><span style={{fontWeight:600}}>{p.value} ({Math.round(p.value/t*100)}%)</span>
      </div>)}
    </div>
  );
};

// === STACKED LABEL ===
const StackLabel = ({x,y,width,value}) => {
  if(!value) return null;
  return <text x={x+width/2} y={y-4} textAnchor="middle" fontSize={9} fill="#374151">{value}</text>;
};

// === CHART COMPONENT ===
const Chart = ({data, title, paidKey, accKey, lostKey, maxVal}) => {
  const reversed = [...data].reverse();
  // Součty za celé zobrazené období
  const periodTotals = {
    [paidKey]: data.reduce((s,d)=>s+(d[paidKey]||0),0),
    [accKey]:  data.reduce((s,d)=>s+(d[accKey]||0),0),
    [lostKey]: data.reduce((s,d)=>s+(d[lostKey]||0),0),
  };
  return (
  <div style={{background:'#fff',borderRadius:10,padding:20,marginBottom:20,boxShadow:'0 1px 3px rgba(0,0,0,.06)'}}>
    <h2 style={{fontSize:15,fontWeight:600,marginBottom:12}}>{title}</h2>
    <ResponsiveContainer width="100%" height={360}>
      <BarChart data={reversed} margin={{left:0,right:10,top:20,bottom:5}}>
        <CartesianGrid strokeDasharray="3 3" vertical={false}/>
        <XAxis dataKey="m" fontSize={11} tick={{fill:'#374151'}} interval={0} angle={-45} textAnchor="end" height={50}/>
        <YAxis domain={[0,maxVal||'auto']} fontSize={11}/>
        <Tooltip content={<CTooltip periodTotals={periodTotals}/>}/>
        <Legend wrapperStyle={{fontSize:12}}/>
        <Bar dataKey={paidKey} name="Contract Paid" stackId="a" fill={C.paid}
          label={({x,y,width,height,index}) => {
            const v = reversed[index]?.[paidKey]||0;
            if(!v||height<14) return null;
            return <text x={x+width/2} y={y+height/2+4} textAnchor="middle" fontSize={9} fill="#fff" fontWeight={600}>{v}</text>;
          }}
        />
        <Bar dataKey={accKey} name="Contract Accepted" stackId="a" fill={C.acc}
          label={({x,y,width,height,index}) => {
            const v = reversed[index]?.[accKey]||0;
            if(!v||height<14) return null;
            return <text x={x+width/2} y={y+height/2+4} textAnchor="middle" fontSize={9} fill="#fff" fontWeight={600}>{v}</text>;
          }}
        />
        <Bar dataKey={lostKey} name="Storno (Lost)" stackId="a" fill={C.lost} radius={[4,4,0,0]}
          label={({x,y,width,height,index}) => {
            const d = reversed[index];
            if(!d) return null;
            const vLost = d[lostKey]||0;
            const total = (d[paidKey]||0)+(d[accKey]||0)+vLost;
            const parts = [];
            if(vLost && height>=14)
              parts.push(<text key="v" x={x+width/2} y={y+height/2+4} textAnchor="middle" fontSize={9} fill="#fff" fontWeight={600}>{vLost}</text>);
            if(total)
              parts.push(<text key="t" x={x+width/2} y={y-5} textAnchor="middle" fontSize={10} fill="#374151" fontWeight={700}>{total}</text>);
            return parts.length ? <g>{parts}</g> : null;
          }}
        />
      </BarChart>
    </ResponsiveContainer>
  </div>
  );
};

// === TOTAL LABEL FOR LOST CHART ===
const TotalLabel = ({x,y,width,height,value,index,data,prefix}) => {
  if(!data||!data[index]) return null;
  const total = LOST_KEYS.reduce((s,k)=>s+(data[index][`${prefix}_${k}`]||0),0);
  if(!total) return null;
  // Only show on top-most bar segment
  const isLast = LOST_KEYS.findLast(k => (data[index][`${prefix}_${k}`]||0) > 0);
  const thisKey = `${prefix}_${LOST_KEYS[LOST_KEYS.length-1]}`;
  // Show label on the last bar in stack
  return <text x={x+width/2} y={y-4} textAnchor="middle" fontSize={9} fill="#374151">{total}</text>;
};

// === LOST CHART COMPONENT ===
const LostChart = ({data, title, prefix}) => {
  const reversed = [...data].reverse();
  return (
  <div style={{background:'#fff',borderRadius:10,padding:20,marginBottom:20,boxShadow:'0 1px 3px rgba(0,0,0,.06)'}}>
    <h2 style={{fontSize:15,fontWeight:600,marginBottom:12}}>{title}</h2>
    <ResponsiveContainer width="100%" height={360}>
      <BarChart data={reversed} margin={{left:0,right:10,top:20,bottom:5}}>
        <CartesianGrid strokeDasharray="3 3" vertical={false}/>
        <XAxis dataKey="m" fontSize={11} tick={{fill:'#374151'}} interval={0} angle={-45} textAnchor="end" height={50}/>
        <YAxis fontSize={11}/>
        <Tooltip content={<LTooltip/>}/>
        <Legend wrapperStyle={{fontSize:11}}/>
        {LOST_KEYS.map((k,i) => (
          <Bar key={k} dataKey={`${prefix}_${k}`} name={LOST_LABELS[k]} stackId="a" fill={LC[i]}
            radius={i===LOST_KEYS.length-1?[4,4,0,0]:[0,0,0,0]}
          />
        ))}
      </BarChart>
    </ResponsiveContainer>
  </div>
  );
};

// === MAIN DASHBOARD ===
const Dashboard = ({rawData}) => {
  const [range, setRange] = useState(27);
  const today = new Date();
  const updated = `${today.getDate()}.${today.getMonth()+1}.${today.getFullYear()}`;

  // Transform Airtable records into data arrays
  const {D, CLD, ILD, hasInsta} = useMemo(() => {
    const D = rawData.map(r => {
      const f = r.fields;
      return {m: f.Label, cp: f.cp||0, ca: f.ca||0, ip: f.ip||0, ia: f.ia||0, cl: f.cl||0, il: f.il||0};
    });
    const CLD = rawData.map(r => {
      const f = r.fields;
      const o = {m: f.Label};
      LOST_KEYS.forEach(k => o[`cl_${k}`] = f[`cl_${k}`]||0);
      return o;
    });
    const ILD = rawData.map(r => {
      const f = r.fields;
      const o = {m: f.Label};
      LOST_KEYS.forEach(k => o[`il_${k}`] = f[`il_${k}`]||0);
      return o;
    });
    const hasInsta = D.some(d => d.ip > 0 || d.ia > 0 || d.il > 0);
    return {D, CLD, ILD, hasInsta};
  }, [rawData]);

  const data = D.slice(-range);
  const cld = CLD.slice(-range);
  const ild = ILD.slice(-range);
  const last = D[D.length - 1];
  const prev = D.length > 1 ? D[D.length - 2] : null;

  const pct = (a, b) => {
    if (!b || b === 0) return '';
    const p = Math.round((a - b) / b * 100);
    return `${p >= 0 ? '+' : ''}${p}% vs ${prev?.m || ''}`;
  };

  const cTotal = last ? last.cp + last.ca : 0;
  const cPrev = prev ? prev.cp + prev.ca : 0;
  const iTotal = last ? last.ip + last.ia : 0;
  const iPrev = prev ? prev.ip + prev.ia : 0;
  const sTotal = last ? last.cl + last.il : 0;
  const sPrev = prev ? prev.cl + prev.il : 0;

  // Determine max values for consistent chart scaling
  const cMax = Math.max(...data.map(d => d.cp + d.ca + d.cl));
  const iMax = hasInsta ? Math.max(...data.map(d => d.ip + d.ia + d.il)) : 0;

  const buttons = [6, 12, 24, D.length];
  const btnLabels = ['6M', '12M', '24M', `${D.length}M`];

  const instaMonths = new Set(data.filter(d => d.ip > 0 || d.ia > 0 || d.il > 0).map(d => d.m));
  const instaData = data.filter(d => instaMonths.has(d.m));
  const instaLost = ild.filter(d => instaMonths.has(d.m));

  return (
    <div style={{maxWidth:1100,margin:'0 auto',padding:'24px 16px'}}>
      {/* Header */}
      <div style={{marginBottom:20}}>
        <h1 style={{fontSize:22,fontWeight:700,color:'#111827'}}>Carvago Order Dashboard</h1>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:4}}>
          <span style={{fontSize:12,color:'#6b7280'}}>Salesforce data | {last?.m} (running)</span>
          <div style={{display:'flex',gap:4}}>
            {buttons.map((b, i) => (
              <button key={i} onClick={() => setRange(b)}
                style={{padding:'4px 12px',fontSize:12,fontWeight:range===b?600:400,
                  background:range===b?'#3b82f6':'#e5e7eb',color:range===b?'#fff':'#374151',
                  border:'none',borderRadius:6,cursor:'pointer'}}>
                {btnLabels[i]}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* Summary Cards */}
      <div style={{display:'flex',gap:12,marginBottom:20,flexWrap:'wrap'}}>
        <Card title={`Carvago - ${last?.m}`} value={cTotal} sub={pct(cTotal, cPrev)}/>
        {hasInsta && <Card title={`Instamotion - ${last?.m}`} value={iTotal} sub={pct(iTotal, iPrev)}/>}
        <Card title="Contract Accepted" value={last ? last.ca + last.ia : 0} sub="not paid, current month" color={C.acc}/>
        <Card title="Contract Paid" value={last ? last.cp + last.ip : 0} sub="paid, current month" color={C.paid}/>
        <Card title={`Storno - ${last?.m}`} value={sTotal} sub={pct(sTotal, sPrev)} color={C.lost}/>
      </div>

      {/* Carvago Orders Chart */}
      <Chart data={data} title={`Carvago - Orders by Month | Updated: ${updated}`}
        paidKey="cp" accKey="ca" lostKey="cl" maxVal={Math.ceil(cMax * 1.1)}/>

      {/* Instamotion Orders Chart */}
      {hasInsta && <Chart data={instaData} title={`Instamotion - Orders by Month | Updated: ${updated}`}
        paidKey="ip" accKey="ia" lostKey="il" maxVal={Math.ceil(iMax * 1.1)}/>}

      {/* Carvago Lost Reasons Chart */}
      <LostChart data={cld} title={`Carvago - Lost Orders by Reason | Updated: ${updated}`} prefix="cl"/>

      {/* Instamotion Lost Reasons Chart */}
      {hasInsta && <LostChart data={instaLost} title={`Instamotion - Lost Orders by Reason | Updated: ${updated}`} prefix="il"/>}

      {/* Footer */}
      <div style={{textAlign:'center',padding:'16px 0',fontSize:11,color:'#9ca3af',borderTop:'1px solid #e5e7eb',marginTop:12}}>
        <div>Source: Salesforce | Data loaded dynamically from Airtable</div>
        <div>Paid Date = Contract Paid | Only Accepted Date = Contract Accepted | Lost Date = Storno</div>
      </div>
    </div>
  );
};

// === APP ROOT ===
// USE_TEST_DATA=false for production (Airtable API fetch)
const USE_TEST_DATA = false;

const App = () => {
  const [data, setData] = useState(USE_TEST_DATA ? TEST_DATA : null);
  const [loading, setLoading] = useState(!USE_TEST_DATA);
  const [error, setError] = useState(null);
  const [token, setToken] = useState(null);

  useEffect(() => {
    if (USE_TEST_DATA) return;
    const t = getToken();
    setToken(t);
    if (!t) { setLoading(false); return; }
    fetchData(t);
  }, []);

  const fetchData = async (t) => {
    setLoading(true); setError(null);
    try {
      const resp = await fetch(API_URL, {headers:{'Authorization':`Bearer ${t}`}});
      if (!resp.ok) {
        if (resp.status===401||resp.status===403) throw new Error('Neplatny token.');
        throw new Error(`API error: ${resp.status}`);
      }
      const json = await resp.json();
      setData(json.records);
    } catch(err) { setError(err.message); }
    finally { setLoading(false); }
  };

  const handleReset = () => {
    try{localStorage.removeItem('airtable_dashboard_token');}catch(e){}
    setToken(null); setData(null); setError(null); setLoading(false);
  };

  if (!USE_TEST_DATA && !token && !loading) return <TokenScreen/>;
  if (loading) return <LoadingScreen/>;
  if (error) return <ErrorScreen msg={error} onRetry={()=>fetchData(token)} onReset={handleReset}/>;
  if (data) return <Dashboard rawData={data}/>;
  return null;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
